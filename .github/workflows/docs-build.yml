---
name: Build documentation
on:
  pull_request:
jobs:
  docs-build:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - run: pip install -r docs-requirements.txt
      - run: mkdocs build
